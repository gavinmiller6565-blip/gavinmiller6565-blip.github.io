<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost & Found - GCHS</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background-color: #f9f7f6; color: #333; }
  header { background-color: #2c6e49; color: white; text-align:center; padding:30px 10px; }
  nav { background-color:#1b4332; text-align:center; padding:10px 0; }
  nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }
  section { max-width:1100px; margin:25px auto; padding:0 15px; }
  .card { background:white; padding:25px; border-radius:12px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin-bottom:25px; }
  table { width:100%; border-collapse:collapse; margin-top:15px; }
  th, td { border:1px solid #333; padding:10px; text-align:left; }
  th { background-color:#2c6e49; color:white; }
  .button { background-color:#2c6e49; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; margin-right:10px; margin-top:10px; }
  .button:hover { background-color:#14532d; }
  iframe { width:100%; border:none; border-radius:12px; margin-top:15px; }
</style>
</head>
<body>

<header>
  <h1>GCHS Lost & Found</h1>
</header>

<nav>
  <a href="index.html">Home</a>
</nav>

<section class="card">
  <h2>Lost & Found Table</h2>
  <button class="button" onclick="window.open('https://docs.google.com/forms/d/e/YOUR_ADD_ITEM_FORM_ID/viewform','_blank')">Add Item</button>
  <button class="button" onclick="window.open('https://docs.google.com/forms/d/e/YOUR_CLAIM_ITEM_FORM_ID/viewform','_blank')">Claim Item</button>
  
  <h3>Current Items</h3>
  <iframe src="https://docs.google.com/spreadsheets/d/e/YOUR_GOOGLE_SHEET_ID/pubhtml?widget=true&amp;headers=false" height="400"></iframe>
</section>

<section class="card">
  <h2>Add Lost Item</h2>
  <iframe src="https://docs.google.com/forms/d/e/YOUR_ADD_ITEM_FORM_ID/viewform?embedded=true" height="500"></iframe>
</section>

<section class="card">
  <h2>Claim Lost Item</h2>
  <iframe src="https://docs.google.com/forms/d/e/YOUR_CLAIM_ITEM_FORM_ID/viewform?embedded=true" height="500"></iframe>
</section>

</body>
</html>
